<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Стилізований портрет-плейсхолдер">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9a692"/>
      <stop offset="0.5" stop-color="#6e5c4d"/>
      <stop offset="1" stop-color="#15110b"/>
    </linearGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2118"/>
      <stop offset="1" stop-color="#171109"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.4">
      <stop offset="0" stop-color="#ffd400" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffd400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- subtle dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="120" r="3"/><circle cx="160" cy="120" r="3"/><circle cx="240" cy="120" r="3"/>
    <circle cx="520" cy="180" r="3"/><circle cx="440" cy="160" r="3"/>
    <circle cx="90" cy="380" r="3"/><circle cx="520" cy="420" r="3"/>
  </g>

  <!-- yellow glow behind head -->
  <circle cx="300" cy="300" r="200" fill="url(#glow)"/>
  <!-- accent ring -->
  <circle cx="300" cy="288" r="132" fill="none" stroke="#ffd400" stroke-width="2.5" opacity="0.55"/>

  <!-- figure: head + shoulders silhouette -->
  <g fill="url(#fig)">
    <!-- shoulders / torso -->
    <path d="M300 470
             C 200 470 132 528 120 640
             C 112 712 116 760 116 800
             L 484 800
             C 484 760 488 712 480 640
             C 468 528 400 470 300 470 Z"/>
    <!-- neck -->
    <rect x="262" y="408" width="76" height="86" rx="30"/>
    <!-- head -->
    <ellipse cx="300" cy="300" rx="104" ry="120"/>
  </g>

  <!-- rim light on figure -->
  <path d="M300 470 C 360 470 412 502 440 556" fill="none" stroke="#caa86f" stroke-width="3" opacity="0.4"/>
  <path d="M300 182 C 350 184 392 224 404 286" fill="none" stroke="#e8d2a0" stroke-width="3" opacity="0.35"/>

  <!-- mono caption -->
  <text x="300" y="742" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="4" fill="#f0e6d4" text-anchor="middle" opacity="0.85">КИРИЛО СЕВЕРОВ</text>
  <text x="300" y="768" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#cbb89f" text-anchor="middle" opacity="0.7">ВЕБ-РОЗРОБКА · SEO</text>
</svg>
